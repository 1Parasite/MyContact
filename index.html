<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ahmed Kefi — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --card-bg: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.12);
      --text-primary: #1a1a18;
      --text-secondary: #6b6b66;
      --text-tertiary: #a0a09a;
      --accent: #2c4a3e;
      --accent-light: #eaf1ee;
      --blue-bg: #eef4fb;
      --blue-icon: #1a5fa8;
      --green-bg: #eef6ef;
      --green-icon: #2a7a30;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 2rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--accent-light);
      border: 1px solid rgba(44,74,62,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lora', serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .card-header h1 {
      font-family: 'Lora', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: 0.2px;
    }

    .badge {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-top: -4px;
    }

    .card-body { padding: 0.4rem 0; }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 1.25rem;
      text-decoration: none;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .contact-row:last-child { border-bottom: none; }
    .contact-row:hover { background: #fafaf8; }

    .icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-linkedin { background: var(--blue-bg); }
    .icon-whatsapp { background: var(--green-bg); }
    .icon-email    { background: var(--accent-light); }

    .row-text { flex: 1; min-width: 0; }

    .row-label {
      font-size: 10px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 2px;
    }

    .row-value {
      font-size: 13.5px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-value.linked { color: var(--blue-icon); }

    .arrow {
      opacity: 0;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .contact-row:hover .arrow { opacity: 1; }

    .card-footer {
      border-top: 1px solid var(--border);
      padding: 12px 1.25rem;
      text-align: center;
    }

    .card-footer p {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }
  </style>
</head>
