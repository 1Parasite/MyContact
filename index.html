<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ahmed Kefi — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e0f;
      font-family: 'DM Sans', sans-serif;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #c9a96e, transparent 70%);
      top: -100px; right: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #4a6fa5, transparent 70%);
      bottom: -80px; left: -80px;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: #161618;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 64px rgba(0,0,0,0.6),
        0 8px 24px rgba(0,0,0,0.4);
      animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-accent {
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, #c9a96e 30%, #e8d4a0 60%, transparent 100%);
    }

    .card-header {
      padding: 2.6rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .avatar-wrap { position: relative; }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c9a96e22, #c9a96e44);
      border: 1px solid rgba(201,169,110,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 500;
      color: #c9a96e;
      letter-spacing: 2px;
    }

    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid rgba(201,169,110,0.15);
    }

    .card-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 500;
      color: #f0ead8;
      letter-spacing: 0.5px;
      text-align: center;
    }

    .badge {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #c9a96e;
      background: rgba(201,169,110,0.08);
      border: 1px solid rgba(201,169,110,0.2);
      padding: 4px 14px;
      border-radius: 100px;
      margin-top: -6px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 60%;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3));
    }
    .divider-line:last-child {
      background: linear-gradient(270deg, transparent, rgba(201,169,110,0.3));
    }
    .divider-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(201,169,110,0.5);
    }

    .card-body { padding: 0.6rem 1.6rem 1rem; }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 10px;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .contact-row:last-child { border-bottom: none; }

    .contact-row:hover {
      background: rgba(255,255,255,0.04);
      transform: translateX(3px);
    }

    .icon-wrap {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-linkedin { background: rgba(10,102,194,0.15); border: 1px solid rgba(10,102,194,0.25); }
    .icon-whatsapp { background: rgba(37,211,102,0.12); border: 1px solid rgba(37,211,102,0.22); }
    .icon-email    { background: rgba(201,169,110,0.10); border: 1px solid rgba(201,169,110,0.20); }

    .row-text { flex: 1; min-width: 0; }

    .row-label {
      font-size: 10px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: #555;
    }

    .row-value {
      font-size: 13.5px;
      color: #c8c2b6;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-value.accent { color: #c9a96e; }

    .arrow-icon {
      opacity: 0.25;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .contact-row:hover .arrow-icon { opacity: 0.6; }

    .card-footer {
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(201,169,110,0.4);
    }

    .card-footer p {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }
  </style>
</head>
